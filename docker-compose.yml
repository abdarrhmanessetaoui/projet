version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb-produits
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    container_name: api-produits
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/produits_db
      - NODE_ENV=production
    depends_on:
      - mongodb

volumes:
  mongodb_data: